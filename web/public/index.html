<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>薄一夏 · 控制台</title>
<script src="/js/vue.min.js"></script>
<script src="/js/vue-router.min.js"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="brand"><h1>薄一夏</h1></div>
    <router-link class="nav-item" to="/">仪表盘</router-link>
    <router-link class="nav-item" to="/logs">日志</router-link>
    <router-link class="nav-item" to="/settings">设置</router-link>
  </nav>
  <div class="main"><router-view></router-view></div>
</div>
<div class="toast" id="toast"></div>

<script type="text/x-template" id="tpl-dashboard">
<div><div class="page-header"><h2>仪表盘</h2><p>服务运行状态与控制</p></div>
<div class="status-grid">
  <div class="status-item"><div class="si-top"><div class="si-info"><h3>NapCat QQ 客户端</h3><div class="si-desc">QQ Bot 底层服务</div></div></div>
    <div class="status-indicator"><span :class="'status-dot '+(napcat.qq?'on pulse':'off')"></span><span>{{napcat.qq?'QQ 已登录':'未运行'}}</span></div>
    <div class="btn-group"><button class="btn btn-primary" :disabled="napcat.qq" @click="act('/api/actions/napcat/start')">启动</button><button class="btn btn-ghost" :disabled="!napcat.qq" @click="act('/api/actions/napcat/stop')">关闭</button></div>
  </div>
  <div class="status-item"><div class="si-top"><div class="si-info"><h3>AI Bot 服务</h3><div class="si-desc">智能对话引擎</div></div></div>
    <div class="status-indicator"><span :class="'status-dot '+(bot.running?'on pulse':'off')"></span><span>{{bot.running?'运行中':'未运行'}}</span></div>
    <div class="btn-group"><button class="btn btn-primary" :disabled="bot.running" @click="act('/api/actions/bot/start')">启动</button><button class="btn btn-ghost" :disabled="!bot.running" @click="act('/api/actions/bot/stop')">关闭</button></div>
  </div>
</div></div>
</script>

<script type="text/x-template" id="tpl-settings">
<div><div class="page-header"><h2>设置</h2><p>AI 模型与身份配置，保存后重启 Bot 生效</p></div>
<div class="card"><form @submit.prevent="save" style="display:flex;flex-direction:column;gap:20px">
  <div class="form-field"><label>背景故事</label><textarea class="textarea" v-model="form.background" style="min-height:60px"></textarea></div>
  <div class="form-field"><label>性格</label><textarea class="textarea" v-model="form.personality" style="min-height:60px"></textarea></div>
  <div class="form-row form-row-3"><div class="form-field"><label>说话风格</label><input class="input" v-model="form.speechStyle"></div>
  <div class="form-field"><label>口头禅 <span style="color:var(--text-tertiary);font-weight:400">选填</span></label><input class="input" v-model="form.catchphrase" placeholder="用逗号分隔"></div>
  <div class="form-field"><label>爱好</label><input class="input" v-model="form.hobbies" placeholder="用逗号分隔"></div></div>
  <div class="form-row form-row-3"><div class="form-field"><label>最好朋友昵称</label><input class="input" v-model="form.bestFriendNickname" placeholder="南"></div>
  <div class="form-field"><label>最好朋友 QQ</label><input class="input" v-model="form.bestFriendQQ" placeholder="3196990846"></div>
  <div class="form-field"><label>关系描述</label><input class="input" v-model="form.bestFriendDesc" placeholder="最好的异性朋友..."></div></div>
  <div class="form-row"><div class="form-field"><label>日常作息</label><input class="input" v-model="form.dailyRoutine"></div>
  <div class="form-field"><label>讨厌的事</label><input class="input" v-model="form.dislikes" placeholder="用逗号分隔"></div></div>
  <div class="form-row"><div class="form-field"><label>名字</label><input class="input" v-model="form.name" required></div>
  <div class="form-field"><label>AI 模型</label><select class="select" v-model="form.model"><option value="deepseek-chat">DeepSeek Chat</option><option value="deepseek-reasoner">DeepSeek Reasoner</option><option value="gpt-4o">GPT-4o</option><option value="gpt-4o-mini">GPT-4o Mini</option></select></div></div>
  <div class="form-field"><label>API Key</label><input class="input" v-model="form.apiKey" type="password" placeholder="sk-..."></div>
  <div class="form-field"><label>API 端点</label><input class="input" v-model="form.baseURL"></div>
  <div class="form-actions"><button type="submit" class="btn btn-primary">保存</button><button type="button" class="btn btn-ghost" @click="reset">恢复默认</button></div>
</form></div></div>
</script>

<script type="text/x-template" id="tpl-logs">
<div><div class="page-header"><h2>日志</h2><p>Bot 运行日志，最近 200 行，每 5 秒刷新</p></div>
<div class="card" style="padding:16px"><div class="log-viewer" v-if="text">{{text}}</div><div class="empty-state" v-else><div class="empty-icon">📄</div><p>暂无日志</p></div></div></div>
</script>

<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/settings.js"></script>
<script src="/js/logs.js"></script>
<script>
const routes=[{path:'/',component:Dashboard},{path:'/settings',component:Settings},{path:'/logs',component:Logs}];
const router=VueRouter.createRouter({history:VueRouter.createWebHashHistory(),routes});
Vue.createApp({}).use(router).mount('#app');
</script>
</body>
</html>
